worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format json escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"server_name":"$server_name"'
    '}';

    upstream security_upstream {
        server security:8080;
    }

    upstream uploader_upstream {
        server uploader:8080;
    }

    upstream minio_upstream {
        server minio:9000;
    }

    upstream kibana_upstream {
        server kibana:5601;
    }

    server {
        listen 80;
        server_name localhost;

        access_log /var/log/nginx/access.log json;
        error_log /var/log/nginx/error.log;

        location /kibana/ {
            auth_basic "Kibana Access";
            auth_basic_user_file /etc/nginx/.htpasswd;
            
            proxy_pass http://kibana_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /kibana;
        }

        location /internal/auth {
            internal;
            proxy_pass http://security_upstream/v1/token/validation/;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Content-Length "";
            proxy_pass_request_body off;
        }

        location /register {
            proxy_pass http://security_upstream/v1/user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /token {
            proxy_pass http://security_upstream/v1/token;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /user {
            auth_request /internal/auth;
            auth_request_set $auth_status $upstream_status;

            proxy_pass http://security_upstream/v1/user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        location /upload {
            auth_request /internal/auth;
            auth_request_set $auth_status $upstream_status;

            proxy_pass http://uploader_upstream/v1/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
            client_max_body_size 10M;
        }

        location /images/ {
            auth_request /internal/auth;
            auth_request_set $auth_status $upstream_status;

            proxy_pass http://minio_upstream/images/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        error_page 401 = @unauthorized;
        location @unauthorized {
            return 401 '{"error":"Unauthorized"}';
            add_header Content-Type application/json;
        }
    }
}